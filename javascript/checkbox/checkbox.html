<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkbox</title>
</head>
<body>
    <label for="check">Confirmar</label>
    <input type="checkbox" id="check"><br><br>
    
    <label for="visaBtn">Visa</label>
    <input type="radio" id="visaBtn" name="cartao"><br>

    <label for="mastercardBtn">Mastercard</label>
    <input type="radio" id="mastercardBtn" name="cartao"><br>

    <label for="paypalBtn">Paypal</label>
    <input type="radio" id="paypalBtn" name="cartao"><br><br>

    <button type="submit" id="enviar">Enviar</button>

    <p id="confirmado"></p><br>
    <p id="escolhido"></p>

    <script src="checkbox.js"></script>
</body>
</html>
