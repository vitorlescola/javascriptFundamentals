<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="calculadora.css">
</head>
<body>

    <div id="calculadora">
        <input id="display" type="text" readonly>
        <div id="botoes">
            <button onclick="adicionarAoDisplay('+')" class="operadaor" >+</button>
            <button onclick="adicionarAoDisplay('-')" class="operadaor" >-</button>
            <button onclick="adicionarAoDisplay('*')" class="operadaor" >&times;</button>
            <button onclick="adicionarAoDisplay('/')" class="operadaor" >&divide;</button>
            <button onclick="calcular()" class="operadaor" >=</button>
            <button onclick="limpar()" class="operadaor" >C</button>
            <button onclick="adicionarAoDisplay('.')">.</button>
            <button onclick="adicionarAoDisplay('0')">0</button>
            <button onclick="adicionarAoDisplay('1')">1</button>
            <button onclick="adicionarAoDisplay('2')">2</button>
            <button onclick="adicionarAoDisplay('3')">3</button>
            <button onclick="adicionarAoDisplay('4')">4</button>
            <button onclick="adicionarAoDisplay('5')">5</button>
            <button onclick="adicionarAoDisplay('6')">6</button>
            <button onclick="adicionarAoDisplay('7')">7</button>
            <button onclick="adicionarAoDisplay('8')">8</button>
            <button onclick="adicionarAoDisplay('9')">9</button>
            
        </div>
        <button onclick="mostrarHistorico()" id="historico">Historico</button>
    </div>

    <div id="historicoCon">
        <h1>Historico</h1>
        <p id="valores"></p>
    </div>
    
    <script src="calculadora.js"></script>
</body>
</html>
