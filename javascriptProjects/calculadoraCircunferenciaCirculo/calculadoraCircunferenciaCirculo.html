<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de circunferência de circulo</title>
    <link rel="stylesheet" href="calculadoraCircunferenciaCirculo.css">
</head>
<body>
    <h1>Calculadora de circunferência de circulo</h1>

    <div id="calculadora">
        <h2>Insira a circunferência do circulo</h2>

       <label for="circunferencia">circunferência</label>
       <input id="radio" type="number" placeholder="circunferência" min="1" autocomplete="off" required>
       <br><br>

       <button id="calcular">Calcular</button>

       <p id="resultado"></p>
    </div>

    <script src="calculadoraCircunferenciaCirculo.js"></script>
</body>
</html>
